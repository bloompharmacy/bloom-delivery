<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#b22025" />
  <title>Bloom Delivery — تأكيد التوصيل</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    /* =========================================================
       DESIGN TOKENS — canonical Bloom design system
       ========================================================= */
    :root {
      --bloom:       #b22025;
      --bloom-dark:  #8b191d;
      --bloom-light: #fdf2f2;
      --bg:          #fdf2f2;      /* Arabic apps use light red tint */
      --surface:     #ffffff;
      --surface-2:   #fafafa;
      --border:      #e5e7eb;
      --border-2:    #d1d5db;
      --text:        #1a1a2e;
      --muted:       #6b7280;
      --success:     #16a34a;
      --success-bg:  #dcfce7;
      --error:       #dc2626;
      --error-bg:    #fee2e2;
      --info:        #2563eb;
      --info-bg:     #dbeafe;
      --warning:     #d97706;
      --warning-bg:  #fef3c7;

      --radius:      12px;
      --radius-lg:   20px;
      --radius-sm:   8px;

      --shadow-sm:   0 1px 2px rgba(0,0,0,0.05);
      --shadow:      0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg:   0 8px 24px rgba(0,0,0,0.12);

      --font-arabic: 'Cairo', system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif;
      --font-head:   'Sora', system-ui, -apple-system, sans-serif;
      --font-mono:   'Courier New', ui-monospace, monospace;
    }

    /* =========================================================
       RESET + BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-arabic);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      font-size: 15px;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }

    /* Hide all views by default — JS reveals one at a time */
    .view { display: none; }
    .view.active { display: block; }

    /* =========================================================
       SHARED COMPONENTS
       ========================================================= */
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    h1, h2, h3 { font-family: var(--font-head); margin: 0; }

    /* --- Logo --- */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .logo-img {
      width: 88px; height: 88px;
      object-fit: contain;
      background: #fff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 6px;
    }
    .logo-img-sm {
      width: 36px; height: 36px;
      object-fit: contain;
      border-radius: 10px;
    }

    /* --- Buttons --- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      border: 1.5px solid transparent;
      border-radius: var(--radius);
      padding: 12px 18px;
      min-height: 48px;          /* touch target */
      transition: all 0.15s ease;
      text-decoration: none;
      white-space: nowrap;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .btn-bloom {
      background: var(--bloom);
      color: #fff;
    }
    .btn-bloom:hover:not(:disabled) { background: var(--bloom-dark); }

    .btn-outline-bloom {
      background: transparent;
      color: var(--bloom);
      border-color: var(--bloom);
    }
    .btn-outline-bloom:hover:not(:disabled) {
      background: var(--bloom-light);
    }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border-2);
    }
    .btn-outline:hover:not(:disabled) { background: var(--surface-2); }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-block { width: 100%; }
    .btn-sm    { min-height: 38px; padding: 8px 14px; font-size: 13px; }

    /* --- Form inputs --- */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .form-control {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
      min-height: 48px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus {
      border-color: var(--bloom);
      box-shadow: 0 0 0 3px rgba(178,32,37,0.12);
    }
    .form-control[readonly] {
      background: var(--surface-2);
      color: var(--text);
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: 1px;
    }
    textarea.form-control {
      min-height: 80px;
      resize: vertical;
      font-family: var(--font-arabic);
    }

    /* Phone input — bigger, monospaced, tracked */
    .input-passcode {
      text-align: center;
      letter-spacing: 6px;
      font-size: 22px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    /* --- Cards --- */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 22px 18px;
      margin-bottom: 14px;
    }

    /* --- Top bar (main view) — mirror of handover.html layout.
       In RTL: logo + name on RIGHT, logout button on LEFT.
       History button sits on its own row immediately below. --- */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
    }
    /* In RTL, the first flex child renders on the RIGHT.
       So .topbar-info (logo+name) is first → appears on right side. */
    .topbar-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .topbar-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 8px;
      padding: 2px;
      flex-shrink: 0;
    }
    .topbar-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .topbar-text {
      min-width: 0;
      text-align: right;
    }
    .topbar-name {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-store {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
      white-space: nowrap;
      margin-top: 2px;
    }
    /* Logout: outlined pill button on the LEFT side (after-flex in RTL) */
    .btn-topbar-logout {
      padding: 8px 16px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .2s, color .2s;
      flex-shrink: 0;
    }
    .btn-topbar-logout:hover {
      border-color: var(--error);
      color: var(--error);
    }
    /* Tab bar — 3 tabs: توصيل / السجل / تحويل
       Pattern mirrors handover.html (segmented control). */
    .tab-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background: var(--surface);
      padding: 6px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .tab-btn {
      padding: 11px 8px;
      background: transparent;
      border: none;
      border-radius: var(--radius);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-btn.active {
      background: var(--bloom);
      color: #fff;
      box-shadow: 0 2px 6px rgba(178,32,37,.25);
    }
    .tab-btn:hover:not(.active) {
      background: var(--bloom-light);
      color: var(--bloom);
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }

    /* --- Scanner --- */
    .scanner-wrap {
      display: none;
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .scanner-wrap.active { display: block; }
    #video-feed {
      display: block;
      width: 100%;
      height: 240px;
      object-fit: cover;
    }
    .scanner-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 75%;
      height: 38%;
      border: 2px solid #fff;
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      pointer-events: none;
    }
    .scanner-controls {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      gap: 8px;
    }
    .scanner-btn {
      flex: 1;
      background: rgba(255,255,255,0.95);
      color: var(--text);
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px;
      font-weight: 700;
      font-size: 13px;
      min-height: 38px;
    }
    .scanner-btn.flash-on { background: var(--warning); color: #fff; }
    .btn-flash:not(.visible) { display: none; }

    /* --- Order summary card (after verify) --- */
    .order-summary {
      background: var(--info-bg);
      border: 1.5px solid #93c5fd;
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }
    .order-summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      font-size: 14px;
    }
    .order-summary-row + .order-summary-row {
      border-top: 1px dashed rgba(37,99,235,0.15);
    }
    .order-summary-label { color: var(--muted); font-weight: 600; }
    .order-summary-value { color: var(--text); font-weight: 700; }
    .order-summary-value.mono { font-family: var(--font-mono); }

    /* --- Status cards (radio-as-card) --- */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .status-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .status-card:hover { border-color: var(--border-2); }
    .status-card.selected {
      border-color: var(--bloom);
      background: var(--bloom-light);
      color: var(--bloom);
      box-shadow: 0 0 0 3px rgba(178,32,37,0.10);
    }
    .status-card .status-icon { font-size: 18px; }
    .status-card.full { grid-column: 1 / -1; }

    /* --- Payment block (conditional) --- */
    .payment-block {
      display: none;
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 8px;
      border: 1px solid var(--border);
    }
    .payment-block.show { display: block; animation: slideDown 0.2s ease; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* --- Success view --- */
    .success-panel {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 32px 22px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .success-check {
      width: 84px; height: 84px;
      background: var(--success-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .success-check svg { width: 44px; height: 44px; color: var(--success); }
    @keyframes pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }
    .success-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 18px;
    }
    .success-meta {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 14px;
      margin: 18px 0;
      display: grid;
      gap: 8px;
      text-align: right;
    }
    .success-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .success-meta-label { color: var(--muted); font-weight: 600; }
    .success-meta-value { color: var(--text); font-weight: 700; font-family: var(--font-mono); }

    .sla-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 13px;
    }
    .sla-badge.on-time { background: var(--success-bg); color: #14532d; }
    .sla-badge.delayed { background: var(--warning-bg); color: #78350f; }

    /* --- History modal --- */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal.show { display: flex; }
    .modal-dialog {
      background: var(--surface);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-close {
      background: transparent;
      border: none;
      font-size: 22px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      line-height: 1;
    }
    .modal-close:hover { background: var(--surface-2); color: var(--text); }
    .modal-body {
      padding: 14px 18px;
      overflow-y: auto;
      flex: 1;
    }

    /* --- History list --- */
    .history-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      background: var(--surface-2);
      align-items: center;
    }
    .history-order {
      font-family: var(--font-mono);
      font-weight: 800;
      font-size: 16px;
      color: var(--text);
    }
    .history-details {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .history-details strong { color: var(--text); }
    .history-status {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .history-status.delivered { background: var(--success-bg); color: #14532d; }
    .history-status.partial   { background: var(--info-bg);    color: #1e3a8a; }
    .history-status.returned  { background: var(--error-bg);   color: #7f1d1d; }
    .history-status.noanswer  { background: var(--warning-bg); color: #78350f; }
    .history-status.postponed { background: #e5e7eb;            color: #374151; }
    .history-status.transfer  { background: #ede9fe;            color: #5b21b6; }
    .history-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 14px;
    }
    /* History filters block — sits between modal header and body */
    .history-filters {
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .filter-row:last-child {
      margin-bottom: 0;
    }
    .filter-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .filter-field.full {
      flex: 1 1 100%;
    }
    .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .filter-input {
      padding: 9px 10px;
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      text-align: right;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      width: 100%;
      box-sizing: border-box;
    }
    .filter-input:focus {
      outline: none;
      border-color: var(--bloom);
    }
    /* Date inputs: keep the native picker LTR but keep layout sound */
    input[type="date"].filter-input {
      direction: ltr;
      text-align: center;
    }
    .filter-search { flex: 1; }
    .filter-reset  { flex: 1; }
    .history-count {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    /* --- Loader --- */
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(255,255,255,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    #loader.show { display: flex; }
    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--bloom);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; color: var(--text); font-weight: 600; }

    /* --- Toast --- */
    #toast-wrap {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10001;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--text);
      color: #fff;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      max-width: 480px;
      pointer-events: auto;
      animation: slideIn 0.25s ease;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--error); }
    .toast.warning { background: var(--warning); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* --- Error message inline --- */
    .error-msg {
      color: var(--error);
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
      min-height: 18px;
    }

    /* --- Section dividers --- */
    .section-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      margin: 18px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Responsive small */
    @media (max-width: 380px) {
      .container { padding: 16px 12px 80px; }
      .status-grid { grid-template-columns: 1fr; }
      .status-card.full { grid-column: 1; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-text">جاري التحميل...</div>
  </div>
  <div id="toast-wrap"></div>

  <div id="view-login" class="view">
    <div class="container">
      <div class="logo-block" style="margin-top: 30px;">
        <img class="logo-img" src="bloom-logo.png" alt="Bloom Pharmacy"
             onerror="this.onerror=null; this.src='bloom-logo.jpg';">
        <h1 style="font-size:22px; color:var(--bloom); margin-top:4px;">Bloom Delivery</h1>
        <div style="font-size:14px; color:var(--muted);">تأكيد التوصيل للمندوبين</div>
      </div>

      <div class="card">
        <h2 style="font-size:18px; margin-bottom:6px;">أهلاً بك</h2>
        <div style="font-size:13px; color:var(--muted); margin-bottom:18px;">
          سجّل دخولك لإتمام التوصيلات
        </div>

        <div class="form-group">
